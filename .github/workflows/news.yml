name: Daily News Bot

on:
  schedule:
    # 7:00 AM IST = 1:30 AM UTC
    - cron: "30 1 * * *"

  workflow_dispatch:

jobs:
  run-news-bot:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run bot
        env:
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          EMAIL: ${{ secrets.SENDER_EMAIL }}
          EMAIL_PASSWORD: ${{ secrets.APP_PASSWORD }}
          TO_EMAIL: ${{ secrets.RECEIVER_EMAIL }}
        run: |
          python news-scraper-bot/newsscraper.py