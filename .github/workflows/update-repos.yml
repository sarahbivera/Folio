name: Update Repositories
on:
  push:
    branches: [ main, project_update ]
  schedule:
    # Run daily at midnight UTC to keep repos updated
    - cron: '0 0 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  update-repos:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r project-update-bot/requirements.txt
      
      - name: Fetch and update repositories
        env:
          GITHUB_USERNAME: ${{ github.repository_owner }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python project-update-bot/projectupdate.py
      
      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          if git diff --quiet repositories.json; then
            echo "No changes to repositories.json"
          else
            git add repositories.json
            git commit -m "chore: update repositories list"
            git push
          fi
